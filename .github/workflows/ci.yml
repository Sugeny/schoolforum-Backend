name: CI/CD

on:
  push:
    branches: [master]
    tags: ['v*']
  pull_request:
    branches: [master]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: suguny/schoolforum-backend

# 避免并发部署冲突
concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

jobs:
  # ==================== 代码质量检查 ====================
  lint:
    name: 代码检查
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: 验证 POM
        run: chmod +x mvnw && ./mvnw validate --batch-mode

      - name: 编译检查
        run: ./mvnw compile --batch-mode

  # ==================== 单元测试 ====================
  test:
    name: 单元测试
    runs-on: ubuntu-latest
    services:
      mysql:
        image: mysql:9
        env:
          MYSQL_ROOT_PASSWORD: test123
          MYSQL_DATABASE: schoolforum_test
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h localhost"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5
      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd="redis-cli ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: 运行测试
        run: chmod +x mvnw && ./mvnw test -Dspring.profiles.active=test --batch-mode

      - name: 上传测试报告
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-reports
          path: target/surefire-reports/
          retention-days: 7

  # ==================== 构建 Docker 镜像 ====================
  build:
    name: 构建并推送镜像
    needs: test
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
    outputs:
      image-tag: ${{ steps.meta.outputs.version }}
      image-digest: ${{ steps.build.outputs.digest }}
    steps:
      - uses: actions/checkout@v4

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GHCR_PAT }}

      - uses: docker/setup-buildx-action@v3

      - name: 清理旧的 GHCR 包版本
        if: github.ref == 'refs/heads/master'
        uses: actions/delete-package-versions@v5
        with:
          package-name: 'schoolforum-backend'
          package-type: 'container'
          min-versions-to-keep: 3
          delete-only-untagged-versions: true

      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=sha,prefix=,format=short
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/master' }}

      - id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64

      - name: 生成发布标签
        if: github.ref == 'refs/heads/master'
        id: release_tag
        run: echo "tag=build-$(date +'%Y%m%d')-$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"

      - uses: actions/setup-java@v4
        if: github.ref == 'refs/heads/master'
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: 构建 JAR
        if: github.ref == 'refs/heads/master'
        run: chmod +x mvnw && ./mvnw package -DskipTests --batch-mode

      - name: 创建 Release 并上传 JAR
        if: github.ref == 'refs/heads/master'
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ steps.release_tag.outputs.tag }}
          name: ${{ steps.release_tag.outputs.tag }}
          generate_release_notes: true
          files: target/*.jar

      - name: 创建 Tag Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v3
        with:
          generate_release_notes: true
          files: target/*.jar

  # ==================== 部署前验证 ====================
  pre-deploy-check:
    name: 部署前验证
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: 验证配置文件
        run: |
          echo "=== 检查 docker-compose.yml ==="
          if ! [ -f docker-compose.yml ]; then
            echo "❌ docker-compose.yml 不存在"
            exit 1
          fi

          echo "=== 检查 nginx 配置 ==="
          if ! [ -f nginx/schoolforum.conf ]; then
            echo "❌ nginx/schoolforum.conf 不存在"
            exit 1
          fi

          echo "✅ 配置文件检查通过"

      - name: 验证 Docker Compose 语法
        run: |
          docker compose -f docker-compose.yml config > /dev/null
          echo "✅ docker-compose.yml 语法正确"

      - name: 检查必需的 Secrets
        env:
          DOCKER_HOST: ${{ secrets.DOCKER_HOST }}
          ROOT_PASSWORD: ${{ secrets.ROOT_PASSWORD }}
          GHCR_PAT: ${{ secrets.GHCR_PAT }}
          GHCR_USER: ${{ secrets.GHCR_USER }}
        run: |
          [ -z "$DOCKER_HOST" ] && echo "❌ DOCKER_HOST 未设置" && exit 1
          [ -z "$ROOT_PASSWORD" ] && echo "❌ ROOT_PASSWORD 未设置" && exit 1
          [ -z "$GHCR_PAT" ] && echo "❌ GHCR_PAT 未设置" && exit 1
          [ -z "$GHCR_USER" ] && echo "❌ GHCR_USER 未设置" && exit 1
          echo "✅ 所有 Secrets 已配置"

  # ==================== 部署到服务器 ====================
  deploy:
    name: 部署到生产环境
    needs: [build, pre-deploy-check]
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'
    runs-on: ubuntu-latest
    environment:
      name: production
      url: https://schoolforum.sugu6.top
    steps:
      - uses: actions/checkout@v4

      - name: 复制部署文件到服务器
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.DOCKER_HOST }}
          username: root
          password: ${{ secrets.ROOT_PASSWORD }}
          port: ${{ secrets.DOCKER_PORT || 22 }}
          source: docker-compose.yml,nginx/
          target: /opt/schoolforum/
          overwrite: true

      - name: SSH 部署
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DOCKER_HOST }}
          username: root
          password: ${{ secrets.ROOT_PASSWORD }}
          port: ${{ secrets.DOCKER_PORT || 22 }}
          command_timeout: 10m
          script_stop: true
          script: |
            set -e
            cd /opt/schoolforum

            echo "=== 备份当前镜像标签 ==="
            CURRENT_IMAGE=$(docker inspect schoolforum --format='{{.Image}}' 2>/dev/null || echo "none")
            echo "当前运行镜像: $CURRENT_IMAGE"

            echo "=== 登录 GHCR ==="
            echo "${{ secrets.GHCR_PAT }}" | docker login ghcr.io -u ${{ secrets.GHCR_USER }} --password-stdin

            echo "=== 拉取最新镜像 ==="
            docker pull ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
            NEW_IMAGE=$(docker inspect ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest --format='{{.Id}}')
            echo "新镜像 ID: $NEW_IMAGE"

            if [ "$CURRENT_IMAGE" = "$NEW_IMAGE" ]; then
              echo "⚠️  镜像未变化，仅重启容器以应用配置更改"
              docker compose restart
              exit 0
            fi

            echo "=== 停止旧容器（保留数据卷）==="
            docker compose down --timeout 30 2>/dev/null || true
            docker rm -f schoolforum-nginx schoolforum-certbot 2>/dev/null || true

            echo "=== 启动新容器 ==="
            docker compose up -d

            echo "=== 等待服务启动（最多120秒）==="
            HEALTHY=false
            for i in {1..24}; do
              sleep 5
              STATUS=$(docker compose ps --format json schoolforum 2>/dev/null | grep -o '"Health":"[^"]*"' | head -1 || echo "")
              if echo "$STATUS" | grep -q "healthy"; then
                echo "✅ Spring Boot 容器健康 (耗时 $((i*5))s)"
                HEALTHY=true
                break
              fi
              echo "等待中... ($((i*5))s) - 状态: $STATUS"
            done

            if [ "$HEALTHY" = "false" ]; then
              echo "❌ 服务启动超时"
              echo "=== 容器状态 ==="
              docker compose ps
              echo "=== Spring Boot 日志 ==="
              docker compose logs schoolforum --tail 100
              echo "=== Nginx 日志 ==="
              docker compose logs nginx --tail 30
              echo "=== 尝试回滚 ==="
              if [ "$CURRENT_IMAGE" != "none" ]; then
                docker compose down --timeout 10
                docker tag $CURRENT_IMAGE ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
                docker compose up -d
                echo "✅ 已回滚到旧版本"
              fi
              exit 1
            fi

            echo "=== 验证 Nginx 连接到后端 ==="
            sleep 3
            if docker compose exec -T nginx wget -q -O- http://schoolforum:8085/actuator/health 2>/dev/null | grep -q "UP"; then
              echo "✅ Nginx 可以连接到后端"
            else
              echo "⚠️  Nginx 到后端连接异常"
              docker compose logs nginx --tail 20
            fi

            echo "=== 验证外部 HTTPS 访问 ==="
            sleep 2
            HTTP_CODE=$(curl -o /dev/null -s -w "%{http_code}" -m 10 https://schoolforum.sugu6.top/actuator/health || echo "000")
            if [ "$HTTP_CODE" = "200" ]; then
              echo "✅ 外部访问正常 (HTTP $HTTP_CODE)"
            else
              echo "⚠️  外部访问返回: HTTP $HTTP_CODE"
            fi

            echo "=== 清理旧镜像 ==="
            docker image prune -f
            docker system df

            echo "=== ✅ 部署成功 ==="
            docker compose ps

      - name: 部署失败通知
        if: failure()
        run: |
          echo "::error::部署失败！请检查日志"
          echo "服务器: ${{ secrets.DOCKER_HOST }}"
          echo "镜像: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest"

  # ==================== 部署后健康检查 ====================
  post-deploy-check:
    name: 部署后健康检查
    needs: deploy
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'
    runs-on: ubuntu-latest
    steps:
      - name: 等待服务稳定
        run: sleep 15

      - name: 健康检查
        run: |
          echo "=== 检查服务健康状态 ==="
          MAX_RETRY=5
          for i in $(seq 1 $MAX_RETRY); do
            HTTP_CODE=$(curl -o /dev/null -s -w "%{http_code}" -m 10 https://schoolforum.sugu6.top/actuator/health || echo "000")
            if [ "$HTTP_CODE" = "200" ]; then
              echo "✅ 服务健康 (HTTP $HTTP_CODE)"
              exit 0
            fi
            echo "尝试 $i/$MAX_RETRY: HTTP $HTTP_CODE"
            sleep 10
          done
          echo "❌ 健康检查失败"
          exit 1

      - name: 检查关键 API
        run: |
          echo "=== 检查关键 API 端点 ==="
          ENDPOINTS=(
            "/categories/list"
            "/posts/list?pageNumber=1&pageSize=1"
          )
          for endpoint in "${ENDPOINTS[@]}"; do
            HTTP_CODE=$(curl -o /dev/null -s -w "%{http_code}" -m 10 "https://schoolforum.sugu6.top${endpoint}" || echo "000")
            if [ "$HTTP_CODE" = "200" ] || [ "$HTTP_CODE" = "401" ]; then
              echo "✅ $endpoint - HTTP $HTTP_CODE"
            else
              echo "⚠️  $endpoint - HTTP $HTTP_CODE"
            fi
          done

      - name: 检查 CORS 配置
        run: |
          echo "=== 验证 CORS 头 ==="
          CORS_HEADER=$(curl -s -I -H "Origin: https://suguny.github.io" \
            https://schoolforum.sugu6.top/categories/list \
            | grep -i "access-control-allow-origin" || echo "")
          if [ -n "$CORS_HEADER" ]; then
            echo "✅ CORS 配置正确: $CORS_HEADER"
          else
            echo "❌ CORS 头缺失"
            exit 1
          fi